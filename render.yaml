services:
  - type: web
    name: datanest-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: datanest-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173"

databases:
  - name: datanest-db
    databaseName: dataset_analysis
    user: datanest_user
    plan: free
    postgresMajorVersion: 15
